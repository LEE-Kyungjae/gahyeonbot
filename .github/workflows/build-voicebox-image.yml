name: Build Voicebox CPU Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out infrastructure definitions
        uses: actions/checkout@v4
        with:
          repository: LEE-Kyungjae/infra
          ref: main
          path: infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: infra/images/voicebox
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/lee-kyungjae/gahyeonbot:voicebox-0.5.0-cpu
            ghcr.io/lee-kyungjae/gahyeonbot:voicebox-52f8d8d
          cache-from: type=gha,scope=voicebox-cpu
          cache-to: type=gha,mode=max,scope=voicebox-cpu

      - name: Allow cluster pulls from the public image package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api --method PATCH /user/packages/container/gahyeonbot -f visibility=public

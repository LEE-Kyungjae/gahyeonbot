name: Sync OpenRouter Secret

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync-openrouter-secret.yml"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT:-22}" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Apply OpenRouter key
        env:
          OPEN_ROUTER: ${{ secrets.OPEN_ROUTER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          test -n "$OPEN_ROUTER"
          printf '%s' "$OPEN_ROUTER" |
            ssh -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" \
              'kubectl -n gahyeonbot create secret generic gahyeonbot-openrouter \
                --from-file=OPENROUTER_API_KEY=/dev/stdin \
                --dry-run=client -o yaml | kubectl apply -f -'

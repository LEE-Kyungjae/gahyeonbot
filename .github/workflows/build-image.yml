name: Build Image

on:
  push:
    branches:
      - develop
      - main
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to GHCR"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: gahyeonbot
  INFRA_REPO: ${{ vars.INFRA_REPO || format('{0}/infra', github.repository_owner) }}
  HAS_INFRA_REPO_TOKEN: ${{ secrets.INFRA_REPO_TOKEN != '' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew clean test bootJar

      - name: Resolve image metadata
        id: meta
        run: |
          set -euo pipefail
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "image=${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}" >> "${GITHUB_OUTPUT}"
          echo "sha_tag=sha-${SHORT_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.push_image == true)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for validation
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push image
        if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.push_image == true)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check out infra repo
        if: (github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.push_image == true)) && env.HAS_INFRA_REPO_TOKEN == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra-repo

      - name: Update infra image tag
        if: (github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.push_image == true)) && env.HAS_INFRA_REPO_TOKEN == 'true'
        run: |
          set -euo pipefail
          FILE="infra-repo/k8s/apps/gahyeonbot/deployment.yaml"
          perl -0pi -e 's#image: \Q${{ steps.meta.outputs.image }}\E:[^\s]+#image: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}#g' "$FILE"

      - name: Commit infra image update
        if: (github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.push_image == true)) && env.HAS_INFRA_REPO_TOKEN == 'true'
        run: |
          set -euo pipefail
          if git -C infra-repo diff --quiet -- k8s/apps/gahyeonbot/deployment.yaml; then
            echo "infra repo already up to date"
            exit 0
          fi
          git -C infra-repo config user.name "github-actions[bot]"
          git -C infra-repo config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C infra-repo add k8s/apps/gahyeonbot/deployment.yaml
          git -C infra-repo commit -m "Deploy gahyeonbot ${{ steps.meta.outputs.sha_tag }}"
          git -C infra-repo push origin main

      - name: Write summary
        run: |
          {
            echo "## Gahyeonbot Image"
            echo
            echo "- Image: \`${{ steps.meta.outputs.image }}\`"
            echo "- Tags: \`${{ steps.meta.outputs.sha_tag }}\`, \`latest\`"
          } >> "${GITHUB_STEP_SUMMARY}"

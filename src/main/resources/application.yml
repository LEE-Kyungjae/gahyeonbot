#apllication.yml
app:
  credentials:
    application-id: ${APPLICATION_ID}
    token: ${TOKEN}
    spotify-client-id: ${SPOTIFY_CLIENT_ID}
    spotify-client-secret: ${SPOTIFY_CLIENT_SECRET}
    openai-api-key: ${OPENAI_API_KEY}
    glm-api-key: ${GLM_API_KEY:}
    glm-model: ${GLM_MODEL:glm-4.7-flash}
    glm-connect-timeout-ms: ${GLM_CONNECT_TIMEOUT_MS:5000}
    glm-read-timeout-ms: ${GLM_READ_TIMEOUT_MS:20000}

spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini  # 저렴한 모델 사용 (GPT-4 대비 1/10 가격)
          temperature: 0.7
          max-tokens: 500     # 응답 길이 제한으로 비용 절감
  application:
    name: gahyeonbot
  profiles:
    default: dev  # 기본 실행 시 dev 프로필 사용 (운영과 동일한 환경)
  main:
    web-application-type: servlet  # 명시적으로 웹 서버 활성화
  jpa:
    open-in-view: false
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  servlet:
    context-path: /api
  shutdown: graceful

bot:
  enabled: ${BOT_ENABLED:true}
  leader-lock:
    enabled: ${BOT_LEADER_LOCK_ENABLED:true}
    key: ${BOT_LEADER_LOCK_KEY:1220338955082399845}
    retry-ms: ${BOT_LEADER_LOCK_RETRY_MS:30000}

# 공통 로깅 패턴
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator 공통
management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

weather:
  rag:
    enabled: ${WEATHER_RAG_ENABLED:true}
    embedding-model: ${WEATHER_RAG_EMBEDDING_MODEL:text-embedding-3-small}
    top-k: ${WEATHER_RAG_TOP_K:4}
    min-similarity: ${WEATHER_RAG_MIN_SIMILARITY:0.35}
    min-text-score: ${WEATHER_RAG_MIN_TEXT_SCORE:0.01}
    vector-weight: ${WEATHER_RAG_VECTOR_WEIGHT:0.75}
    text-weight: ${WEATHER_RAG_TEXT_WEIGHT:0.25}

tts:
  enabled: ${TTS_ENABLED:true}
  provider: ${TTS_PROVIDER:voicebox}
  fallback-to-edge: ${TTS_FALLBACK_TO_EDGE:true}
  max-chars: ${TTS_MAX_CHARS:400}
  segment-max-chars: ${TTS_SEGMENT_MAX_CHARS:120}
  timeout-seconds: ${TTS_TIMEOUT_SECONDS:20}
  edge:
    bin: ${TTS_EDGE_BIN:edge-tts}
    voice: ${TTS_EDGE_VOICE:ko-KR-SunHiNeural}
    rate: ${TTS_EDGE_RATE:+0%}
    pitch: ${TTS_EDGE_PITCH:+0Hz}
  custom:
    endpoint: ${CUSTOM_TTS_ENDPOINT:}
    api-key: ${CUSTOM_TTS_API_KEY:}
    model: ${CUSTOM_TTS_MODEL:}
    speaker-id: ${CUSTOM_TTS_SPEAKER_ID:}
    format: ${CUSTOM_TTS_FORMAT:wav}
    timeout-seconds: ${CUSTOM_TTS_TIMEOUT_SECONDS:60}
  voicebox:
    base-url: ${VOICEBOX_BASE_URL:http://127.0.0.1:17493}
    profile-id: ${VOICEBOX_PROFILE_ID:1df376d5-c74d-415c-a2f0-fdb1654f7331}
    profile-name: ${VOICEBOX_PROFILE_NAME:내 목소리 (녹음 9)}
    language: ${VOICEBOX_LANGUAGE:ko}
    engine: ${VOICEBOX_ENGINE:qwen}
    model-size: ${VOICEBOX_MODEL_SIZE:0.6B}
    normalize: ${VOICEBOX_NORMALIZE:true}
    timeout-seconds: ${VOICEBOX_TIMEOUT_SECONDS:300}
    poll-millis: ${VOICEBOX_POLL_MILLIS:500}
  kss:
    python: ${TTS_PYTHON:python3}
    script: ${TTS_KSS_SCRIPT:/app/tts_split.py}

assistant:
  enabled: ${ASSISTANT_ENABLED:false}
  max-utterance-seconds: ${ASSISTANT_MAX_UTTERANCE_SECONDS:20}
  silence-millis: ${ASSISTANT_SILENCE_MILLIS:900}
  speak-responses: ${ASSISTANT_SPEAK_RESPONSES:true}
  vad:
    enabled: ${ASSISTANT_VAD_ENABLED:true}
    hop-size: ${ASSISTANT_VAD_HOP_SIZE:256}
    threshold: ${ASSISTANT_VAD_THRESHOLD:0.5}
    min-speech-millis: ${ASSISTANT_VAD_MIN_SPEECH_MILLIS:300}
    end-silence-millis: ${ASSISTANT_VAD_END_SILENCE_MILLIS:1200}
    pre-roll-millis: ${ASSISTANT_VAD_PRE_ROLL_MILLIS:240}
  stt:
    enabled: ${ASSISTANT_STT_ENABLED:false}
    base-url: ${ASSISTANT_STT_BASE_URL:https://api.openai.com/v1}
    endpoint: ${ASSISTANT_STT_ENDPOINT:/audio/transcriptions}
    api-key: ${ASSISTANT_STT_API_KEY:}
    model: ${ASSISTANT_STT_MODEL:gpt-4o-mini-transcribe}
    language: ${ASSISTANT_STT_LANGUAGE:ko}
    timeout-seconds: ${ASSISTANT_STT_TIMEOUT_SECONDS:30}
    api-key-required: ${ASSISTANT_STT_API_KEY_REQUIRED:true}
  openrouter:
    enabled: ${ASSISTANT_OPENROUTER_ENABLED:false}
    api-key: ${OPENROUTER_API_KEY:}
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
    model: ${OPENROUTER_MODEL:}
    timeout-seconds: ${OPENROUTER_TIMEOUT_SECONDS:60}

notifications:
  dm:
    enabled: ${NOTIFICATIONS_DM_ENABLED:true}
    max-retries: ${NOTIFICATIONS_DM_MAX_RETRIES:3}
    trending-enabled: ${NOTIFICATIONS_DM_TRENDING_ENABLED:true}
    trending-cron: ${NOTIFICATIONS_DM_TRENDING_CRON:0 0 7 * * *}
    schedule-zone: ${NOTIFICATIONS_DM_SCHEDULE_ZONE:Asia/Seoul}
    trending-summary-enabled: ${NOTIFICATIONS_DM_TRENDING_SUMMARY_ENABLED:true}
    trending-summary-cron: ${NOTIFICATIONS_DM_TRENDING_SUMMARY_CRON:0 50 6 * * *}
